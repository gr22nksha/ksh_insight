<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>KSH Insight</title>

<link rel="stylesheet" href="css/style.css">
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
    
</head>

<body>

<header class="topbar">

    <div class="logo">
        <h1>KSH Insight</h1>
        <span>한국사회주택협회</span>
    </div>

    <div class="updated">
        마지막 업데이트
        <span id="updatedTime">-</span>
    </div>

</header>

<section class="kpi">

    <div class="card">
        <div class="title">사업지</div>
        <div id="totalHousing">0</div>
    </div>

    <div class="card">
        <div class="title">공급세대</div>
        <div id="totalHouseholds">0</div>
    </div>

    <div class="card">
        <div class="title">운영기관</div>
        <div id="totalOrg">0</div>
    </div>

    <div class="card">
        <div class="title">광역</div>
        <div id="totalRegion">0</div>
    </div>

</section>

<section class="searchArea">

    <input
        id="keyword"
        type="text"
        placeholder="주택명 · 운영기관 · 위치 검색">

    <button id="filterButton">

        상세검색

    </button>

</section>

<section id="filterPanel" class="hidden">

    <!-- 다음 Commit에서 구현 -->

</section>

<section class="activeFilters">

    <div id="filterTags"></div>

</section>

<section class="tableArea">

<table>

<thead>

<tr>

<th>주택명</th>
<th>운영기관</th>
<th>광역</th>
<th>유형</th>
<th>세대</th>
<th>운영상태</th>

</tr>

</thead>

<tbody id="housingTable">

</tbody>

</table>

</section>


</body>

</html>
